openapi: 3.0.1
info:
  title: Auth Microservice API
servers:
  - url: http://auth-service:8086
    description: Generated server url
paths:
  /api/auth/user/update_status:
    put:
      tags:
        - user-controller
      description:
        Activates or deactivates a user account by their unique user ID.
        Pass active=true to activate and active=false to deactivate the account.
      operationId: updateUserStatus
      parameters:
        - name: userId
          in: query
          required: true
          description: Unique ID of the user whose status needs to be updated
          schema:
            type: integer
            format: int64#
        - name: active
          in: query
          required: true
          description: Set true to activate the user, false to deactivate
          schema:
            type: boolean
        - name: Accept-Language
          in: header
          required: false
          description: Language preference for the response. Default is English
          schema:
            type: string
            default: en
      responses:
        200:
          description: User status updated successfully
          content:
            schema:
              $ref: "#/components/schemas/ResponseMessageBoolean"
  /api/auth/user/farmer_status:
    put:
      tags:
        - user-controller
      summary: Update Farmer Status
      description:
        Updates the farmer verification status for a specific user. Used
        to mark a user as a verified farmer or revoke farmer status.
      operationId: farmerStatus
      parameters:
        - name: userId
          in: query
          required: true
          description: Unique ID of the user whose farmer status needs to be updated
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: true
          description: Set true to grant farmer status, false to revoke it
          schema:
            type: boolean
      responses:
        200:
          description: Farmer status updated successfully
          content:
            schema:
              $ref: "#/components/schemas/ResponseMessageString"
